version: "3"

vars:
  BINARY: revu
  PKG: ./cmd/revu
  BUILD_DIR: build/bin
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: >-
    -s -w
    -X main.version={{.VERSION}}
    -X main.commit={{.COMMIT}}
    -X main.date={{.DATE}}

tasks:
  default:
    desc: Lista tasks disponíveis
    cmds:
      - task --list

  build:
    desc: Compila binário em build/bin/revu (frontend + Wails desktop tags)
    deps: [build:frontend]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -trimpath -tags desktop,production,webkit2_41 -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY}} {{.PKG}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - frontend/dist/**
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY}}"

  build:frontend:
    desc: Build do frontend React/Vite (gera frontend/dist)
    dir: frontend
    cmds:
      - pnpm run build
    sources:
      - src/**
      - components/**
      - lib/**
      - index.html
      - vite.config.ts
      - tsconfig.json
      - package.json
    generates:
      - dist/**

  install:frontend:
    desc: Instala deps do frontend (e dispara husky prepare → registra .husky/_/ como core.hooksPath)
    dir: frontend
    cmds:
      - pnpm install

  gen:
    desc: Gera frontend/src/shared/generated/constants.ts a partir das constantes Go (config.Defaults/Limits + uilimits)
    cmds:
      - go generate ./internal/config/...
    sources:
      - internal/config/bounds.go
      - internal/config/config.go
      - internal/config/export.go
      - internal/uilimits/uilimits.go
      - cmd/gentsconst/main.go
    generates:
      - frontend/src/shared/generated/constants.ts

  lint:frontend:
    desc: ESLint flat no frontend (zero warnings esperado)
    dir: frontend
    cmds:
      - pnpm lint

  lint:frontend:fix:
    desc: ESLint flat com autofix
    dir: frontend
    cmds:
      - pnpm lint:fix

  fmt:frontend:
    desc: Prettier --write em todo o frontend
    dir: frontend
    cmds:
      - pnpm format

  typecheck:frontend:
    desc: tsc --noEmit no frontend
    dir: frontend
    cmds:
      - pnpm typecheck

  dev:
    desc: Hot-reload com wails dev (frontend + backend)
    cmds:
      - wails dev -tags wailsdev

  run:
    desc: Compila e roda `revu run`
    deps: [build]
    cmds:
      - "{{.BUILD_DIR}}/{{.BINARY}} run"

  test:
    desc: Roda testes com race detector
    cmds:
      - go test -race ./...

  lint:
    desc: Aplica formatters (gofmt/goimports/golines) e roda golangci-lint -v
    cmds:
      - golangci-lint fmt ./...
      - golangci-lint run -v ./...

  lint:fix:
    desc: Aplica formatters + golangci-lint --fix nos linters que suportam autofix
    cmds:
      - golangci-lint fmt ./...
      - golangci-lint run --fix -v ./...

  fmt:
    desc: Aplica formatters (gofmt + goimports + golines) via golangci-lint
    cmds:
      - golangci-lint fmt ./...

  check:
    desc: Verificação completa após mudança de código — fmt+lint, vet, test
    cmds:
      - task: lint
      - go vet ./...
      - go test -race ./...

  mutate:
    desc: Mutation testing scoped (store + profiles + poller). Lento — manual ou nightly.
    cmds:
      - task: mutate:store
      - task: mutate:profiles
      - task: mutate:poller

  mutate:store:
    desc: Mutation testing em internal/store
    cmds:
      - gremlins unleash ./internal/store

  mutate:profiles:
    desc: Mutation testing em internal/profiles
    cmds:
      - gremlins unleash ./internal/profiles

  mutate:poller:
    desc: Mutation testing em internal/poller
    cmds:
      - gremlins unleash ./internal/poller

  mutate:dry:
    desc: Dry-run gremlins (lista mutantes sem rodar testes — rápido)
    cmds:
      - gremlins unleash --dry-run ./internal/store
      - gremlins unleash --dry-run ./internal/profiles
      - gremlins unleash --dry-run ./internal/poller

  fuzz:
    desc: Fuzz testing (store + profiles). Manual — 30s por target.
    cmds:
      - task: fuzz:store
      - task: fuzz:profiles

  fuzz:store:
    desc: Fuzz parseTimePtr (30s)
    cmds:
      - go test -run=^$ -fuzz=^FuzzParseTimePtr$ -fuzztime=30s ./internal/store

  fuzz:profiles:
    desc: Fuzz isUniqueNameViolation (30s)
    cmds:
      - go test -run=^$ -fuzz=^FuzzIsUniqueNameViolation$ -fuzztime=30s ./internal/profiles

  install:
    desc: Instala binário em ~/.local/bin
    deps: [build]
    cmds:
      - install -Dm755 {{.BUILD_DIR}}/{{.BINARY}} "$HOME/.local/bin/{{.BINARY}}"

  install:hooks:
    desc: Instala git hooks via husky (pre-commit lint-staged + pre-push task check)
    deps: [install:frontend]
    cmds:
      - echo "hooks instalados via husky — core.hooksPath = .husky/_/"
      - echo "pre-commit roda lint-staged no frontend; pre-push roda task check"

  release:
    desc: Build otimizado (strip + trimpath + ldflags) — binário em build/bin/revu
    deps: [build:frontend]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -trimpath -tags desktop,production,webkit2_41 -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY}} {{.PKG}}

  icons:
    desc: Resize PNGs-fonte da tray/notifier/janela pra 256px (8-bit RGBA — GTK/webkit2gtk quebram em 16-bit)
    cmds:
      - magick assets/icons/tray-idle.png    -resize 256x256 -depth 8 -define png:color-type=6 PNG32:assets/icons/tray-idle-256.png
      - magick assets/icons/tray-pending.png -resize 256x256 -depth 8 -define png:color-type=6 PNG32:assets/icons/tray-pending-256.png
    sources:
      - assets/icons/tray-idle.png
      - assets/icons/tray-pending.png
    generates:
      - assets/icons/tray-idle-256.png
      - assets/icons/tray-pending-256.png
