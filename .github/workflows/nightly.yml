name: Nightly

on:
  schedule:
    # 04:00 UTC = 01:00 BRT — fora do horário de trabalho
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  mutation:
    name: Mutation testing (gremlins)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest

      - name: Run mutation testing
        run: task mutate

  fuzz:
    name: Fuzz testing
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run fuzz tests
        run: task fuzz

  notify-on-failure:
    name: Open issue on failure
    needs: [mutation, fuzz]
    if: failure()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Nightly run failed (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              `Nightly job (mutation + fuzz) failed.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              ``,
              `Investigar antes do próximo merge — mutantes vivos ou novos crashes de fuzz indicam regressão de cobertura.`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["nightly", "ci"],
            });
