name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build + Publish release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build release binary
        run: task release

      - name: Package artifact
        id: package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STAGE="revu-${VERSION}-linux-amd64"
          mkdir -p "dist/${STAGE}"
          cp build/bin/revu "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/"
          if [ -f LICENSE ]; then
            cp LICENSE "dist/${STAGE}/"
          fi
          tar -C dist -czf "dist/${STAGE}.tar.gz" "${STAGE}"
          (cd dist && sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256")
          echo "stage=${STAGE}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi
          {
            echo "changelog<<EOF"
            git log --pretty=format:"- %s (%h)" "$RANGE"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}

            ## Install

            ```bash
            curl -L -o revu.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.package.outputs.stage }}.tar.gz
            tar -xzf revu.tar.gz
            install -Dm755 ${{ steps.package.outputs.stage }}/revu ~/.local/bin/revu
            ```
          generate_release_notes: false
          fail_on_unmatched_files: true
