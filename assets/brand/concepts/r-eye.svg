  <!-- background plate (transparent on tray, filled on press kit) -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="oklch(0.58 0.18 288)"/>

  <!-- stem of r -->
  <rect x="16" y="18" width="7" height="32" rx="2" ry="2" fill="oklch(0.98 0.01 288)"/>

  <!-- shoulder of r curving into iris -->
  <path d="M23 26
           Q23 18 36 18
           L46 18
           L46 25
           L36 25
           Q30 25 30 32
           L23 32 Z"
        fill="oklch(0.98 0.01 288)"/>

